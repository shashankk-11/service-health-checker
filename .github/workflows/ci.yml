name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: dummy
      DB_NAME: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run lint (Biome)
        run: bun run lint

      - name: Run tests
        run: NODE_ENV=test bun test

      - name: Build Docker image
        run: docker build -t service-health-checker .